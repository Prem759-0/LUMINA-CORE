<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | Quantum Core</title>
    <link rel="stylesheet" href="styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <main id="smooth-wrapper">
        <section class="scene intro">
            <h1 class="reveal-text">AETHER</h1>
            <p class="subtitle">The first infinite quantum processor.</p>
            <div class="scroll-indicator">Scroll to Ignite</div>
        </section>

        <section class="scene feature-1">
            <div class="glass-card">
                <h2>BEYOND LIMITS</h2>
                <p>100 billion operations per nanosecond. Harnessing the power of zero-point energy.</p>
            </div>
        </section>

        <section class="scene feature-2">
            <div class="glass-card right">
                <h2>NEURAL SYNTHESIS</h2>
                <p>Aether does not compute. It thinks. It evolves. Welcome to the dawn of true machine consciousness.</p>
            </div>
        </section>
        
        <section class="scene outro">
            <h1 class="glow-text">WELCOME TO 2045.</h1>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
